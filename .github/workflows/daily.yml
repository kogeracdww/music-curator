name: Daily Music Discovery

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  discover-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discovery (YouTube API + Claude API)
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_PLAYLIST_TODAY:      ${{ secrets.YT_PLAYLIST_TODAY }}
          YT_PLAYLIST_YESTERDAY:  ${{ secrets.YT_PLAYLIST_YESTERDAY }}
          SPOTIFY_CLIENT_ID:      ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET:  ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python scripts/discover.py

      - name: Send email
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_email.py

      - name: Upload discovery data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discovery-data
          path: data/
          retention-days: 2
